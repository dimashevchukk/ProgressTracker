databases:
  - name: postgres
    plan: free
    databaseName: neondb
    user: neondb_owner

services:
  - type: web
    plan: free
    name: ProgressTracker
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn config.wsgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neondb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4